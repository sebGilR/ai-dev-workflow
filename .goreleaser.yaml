# GoReleaser configuration for ai-dev-workflow
# Documentation: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: aidw-darwin-amd64
    main: ./cmd/aidw
    binary: aidw
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target x86_64-macos
      - CXX=zig c++ -target x86_64-macos
    flags:
      - -tags=sqlite_ext
    goos:
      - darwin
    goarch:
      - amd64

  - id: aidw-darwin-arm64
    main: ./cmd/aidw
    binary: aidw
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target aarch64-macos
      - CXX=zig c++ -target aarch64-macos
    flags:
      - -tags=sqlite_ext
    goos:
      - darwin
    goarch:
      - arm64

  - id: aidw-linux-amd64
    main: ./cmd/aidw
    binary: aidw
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target x86_64-linux-gnu
      - CXX=zig c++ -target x86_64-linux-gnu
    flags:
      - -tags=sqlite_ext
    goos:
      - linux
    goarch:
      - amd64

  - id: aidw-linux-arm64
    main: ./cmd/aidw
    binary: aidw
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target aarch64-linux-gnu
      - CXX=zig c++ -target aarch64-linux-gnu
    flags:
      - -tags=sqlite_ext
    goos:
      - linux
    goarch:
      - arm64

archives:
  - formats:
      - tar.gz
    # GoReleaser v2: archives.name_template is fine
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

# GoReleaser v2: brews instead of homebrews
brews:
  - name: aidw
    repository:
      owner: sebGilR
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sebGilR/ai-dev-workflow"
    description: "Portable Claude + GitHub Copilot workflow kit for VS Code workspaces"
    license: "MIT"
    test: |
      system "#{bin}/aidw --version"
    install: |
      bin.install "aidw"
