# GoReleaser configuration for ai-dev-workflow
# Documentation: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: aidw
    main: ./cmd/aidw
    binary: aidw
    env:
      - CGO_ENABLED=1 # Required for mattn/go-sqlite3
    flags:
      - -tags=sqlite_ext
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    # this name template makes the result look like: aidw_v1.2.3_darwin_arm64.tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

brews:
  - name: aidw
    repository:
      owner: sebGilR
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sebGilR/ai-dev-workflow"
    description: "Portable Claude + GitHub Copilot workflow kit for VS Code workspaces"
    license: "MIT"
    test: |
      system "#{bin}/aidw --version"
    install: |
      bin.install "aidw"
