# GoReleaser configuration for ai-dev-workflow
# Documentation: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: aidw
    main: ./cmd/aidw
    binary: aidw
    env:
      - CGO_ENABLED=1
      # Use Zig as the cross-compiler for CGO
      - CC=zig cc -target {{ .Arch }}-{{ .Os }}{{ if .Arm }}hf{{ end }}
      - CXX=zig c++ -target {{ .Arch }}-{{ .Os }}{{ if .Arm }}hf{{ end }}
    flags:
      - -tags=sqlite_ext
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    # GoReleaser v2: archives.name_template is fine
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

# GoReleaser v2: homebrews instead of brews
homebrews:
  - name: aidw
    repository:
      owner: sebGilR
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sebGilR/ai-dev-workflow"
    description: "Portable Claude + GitHub Copilot workflow kit for VS Code workspaces"
    license: "MIT"
    test: |
      system "#{bin}/aidw --version"
    install: |
      bin.install "aidw"
